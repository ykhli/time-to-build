// ---------- the corpus: Marc Andreessen, "It's Time to Build" (April 2020) ----------
const CORPUS = `
Every Western institution was unprepared for the coronavirus pandemic, despite many prior warnings. This monumental failure of institutional effectiveness will reverberate for the rest of the decade, but it's not too early to ask why, and what we need to do about it. Part of the problem is clearly foresight, a failure of imagination. But the other part of the problem is what we didn't do in advance, and what we're failing to do now. And that is a failure of action, and specifically our widespread inability to build. We could have these things but we chose not to. We chose not to have the mechanisms, the factories, the systems to make these things. We chose not to build. You see it in housing and the physical footprint of our cities. We should have gleaming skyscrapers and spectacular living environments in all our best cities at levels way beyond what we have now; where are they? You see it in education. Why not educate every 18 year old? Isn't that the most important thing we can possibly do? You see it in manufacturing. Why aren't we building giant, gleaming, state of the art factories producing every conceivable kind of product, at the highest possible quality and lowest possible cost, all throughout our country? The problem is desire. We need to want these things. The problem is inertia. We need to want these things more than we want to prevent these things. The problem is regulatory capture. We need to want new companies to build these things, even if incumbents don't like it. And the problem is will. We need to build these things. I think building is how we reboot the American dream. We need to break the rapidly escalating price curves for housing, education, and healthcare, to make sure that every American can realize the dream, and the only way to do that is to build. Building isn't easy, or we'd already be doing all this. We need to demand more of our political leaders, of our CEOs, our entrepreneurs, our investors. We need to demand more of our culture, of our society. And we need to demand more from one another. We're all necessary, and we can all contribute, to building. Every step of the way, to everyone around us, we should be asking the question: what are you building? Our nation and our civilization were built on production, on building. Our forefathers and foremothers built roads and trains, farms and factories, then the computer, the microchip, the smartphone. There is only one way to honor their legacy and to create the future we want for our own children and grandchildren, and that's to build. It's time to build.
`.trim() + " ";

// ---------- tokenizer: assign a colour class to every char ----------
// white / grey combo: bright glyphs hold against the dark brick and glass;
// greys let filler words recede while staying legible
const COLORS = {
  keyword: ['#ffffff', '#fdf8ef'],              // build — pure white, the standout
  string:  ['#e8e4dc', '#ded9cf'],              // proper nouns — warm off-white
  number:  ['#f0ece2', '#e3ddd0'],              // numbers — ivory
  comment: ['rgba(210,206,198,0.55)', 'rgba(195,190,180,0.6)'], // small words — faded grey
  punct:   ['#b8b3a8', '#a8a298'],              // punctuation — mid grey
  ident:   ['#f5f2ea', '#e9e5da', '#d9d4c8'],   // body words — white to light grey
};
const KEYWORDS = /\b(build|builds|built|builders?|buildings?)\b/gi;
function tokenize(src) {
  const cls = new Array(src.length).fill('ident');
  const mark = (re, name) => {
    re.lastIndex = 0; let m;
    while ((m = re.exec(src))) for (let i = m.index; i < m.index + m[0].length; i++) cls[i] = name;
  };
  mark(/\b(the|a|an|of|to|and|or|in|on|is|it|its|it's|we|our|for|that|this|these|but|not|be|do|was|what|why)\b/gi, 'comment');
  mark(/[.,;:!?'"—-]/g, 'punct');
  mark(/\b\d[\d.]*\b/g, 'number');
  mark(/\b[A-Z][a-z]+\b/g, 'string');
  mark(KEYWORDS, 'keyword');
  let seed = 24681357 >>> 0;
  const rnd = () => (seed = (seed * 1664525 + 1013904223) >>> 0) / 4294967296;
  const out = [];
  for (let i = 0; i < src.length; i++) {
    const ch = src[i];
    if (ch === '\n' || ch === ' ' || ch === '\t') continue;
    const shades = COLORS[cls[i]];
    out.push([ch, shades[Math.floor(rnd() * shades.length)]]);
  }
  return out;
}
const STREAM = tokenize(CORPUS);

let energy = 0;               // rises as notes play, decays slowly

// rasterizable copies of the heads (SVG needs explicit size for drawImage);
// each is pre-rendered once into an offscreen canvas — blitting canvases is
// cheap, while drawImage(svgImage) re-rasterizes every call and kills fps
const headImgs = {}, headCanvases = {};
for (const k in HEADS) {
  const im = new Image();
  im.src = 'data:image/svg+xml;charset=utf-8,' +
    encodeURIComponent(HEADS[k].replace('<svg ', '<svg width="256" height="256" '));
  im.onload = () => {
    const c = document.createElement('canvas');
    c.width = c.height = 160;
    c.getContext('2d').drawImage(im, 0, 0, 160, 160);
    headCanvases[k] = c;
  };
  headImgs[k] = im;
}

// ---------- the sea of flowers ----------
// spawn spots ring the photo: a deep band along the street, climbing the
// torn side edges, a sparse crown on top. Sorted so the sea rises from the
// bottom center outward as more notes are played.
const flowerSpots = [];
{
  let seed = 13579 >>> 0;
  const rnd = () => (seed = (seed * 1664525 + 1013904223) >>> 0) / 4294967296;
  const keys = Object.keys(HEADS);
  const sp = (rx, ry, s, key) => flowerSpots.push({
    rx, ry, s, key,
    kind: keys[Math.floor(rnd() * keys.length)],
    rot: (rnd() - 0.5) * 0.9, phase: rnd() * 7,
    rebloomEvery: 3 + rnd() * 4,
  });
  for (let i = 0; i < 66; i++) {                    // the sea in front
    const rx = -0.09 + 1.18 * rnd();
    sp(rx, 0.96 + 0.11 * rnd(), 30 + 34 * rnd(), Math.abs(rx - 0.5) * 2 + rnd() * 0.4);
  }
  for (const side of [-1, 1]) for (let i = 0; i < 19; i++) {  // torn side edges
    const rx = side < 0 ? -0.06 + 0.055 * rnd() : 1.005 + 0.055 * rnd();
    const ry = 0.10 + 0.84 * rnd();
    sp(rx, ry, 22 + 26 * rnd(), 1.7 + (1 - ry) * 1.3 + rnd() * 0.4);
  }
  for (let i = 0; i < 18; i++) {                    // sparse crown
    const rx = -0.03 + 1.06 * rnd();
    sp(rx, -0.06 + 0.07 * rnd(), 18 + 22 * rnd(), 3.4 + Math.abs(rx - 0.5) + rnd() * 0.5);
  }
  flowerSpots.sort((a, b) => a.key - b.key);
}
// the outer field: hundreds more spots covering the whole page, filling
// outward from the photo as the player keeps going — the paper itself
// gradually becomes a flower field (positions in viewport fractions)
const fieldSpots = [];
{
  let seed = 8675309 >>> 0;
  const rnd = () => (seed = (seed * 1664525 + 1013904223) >>> 0) / 4294967296;
  const keys = Object.keys(HEADS);
  for (let i = 0; i < 380; i++) {
    const vx = -0.015 + 1.03 * rnd();
    const vy = -0.015 + 1.03 * rnd();
    fieldSpots.push({
      vx, vy, s: 15 + 27 * rnd() + (rnd() < 0.07 ? 22 : 0),
      key: Math.hypot((vx - 0.5) * 1.45, vy - 0.5) + rnd() * 0.22,
      kind: keys[Math.floor(rnd() * keys.length)],
      rot: (rnd() - 0.5) * 0.9, phase: rnd() * 7,
      rebloomEvery: 3 + rnd() * 4,
    });
  }
  fieldSpots.sort((a, b) => a.key - b.key);
}
let fieldCursor = 0;
function nextFieldSpot() {
  while (fieldCursor < fieldSpots.length) {
    const s = fieldSpots[fieldCursor++];
    const x = s.vx * W, y = s.vy * H;
    // keep the building, the staff, and the corner controls clear
    if (x > imgBox.x + imgBox.w * 0.05 && x < imgBox.x + imgBox.w * 0.95 &&
        y > imgBox.y + imgBox.h * 0.05 && y < imgBox.y + imgBox.h * 0.92) continue;
    if (y > H - 130 && Math.abs(x - W / 2) < Math.min(W * 0.28, 450) + 40) continue;
    if (y > H - 110 && (x < 150 || x > W - 150)) continue;
    if (y < 90 && Math.abs(x - W / 2) < 300) continue;   // keep the tagline clear
    return { rx: (x - imgBox.x) / imgBox.w, ry: (y - imgBox.y) / imgBox.h,
             s: s.s, kind: s.kind, rot: s.rot, phase: s.phase, rebloomEvery: s.rebloomEvery };
  }
  return null;
}
const flowers = [];
function spawnFlowers() {
  const n = flowers.length < 44 ? 2 : 1;            // sea rises fast, then keeps growing
  for (let i = 0; i < n; i++) {
    let s = null;
    if (flowers.length < flowerSpots.length) s = flowerSpots[flowers.length];
    else s = nextFieldSpot();
    if (!s) return;
    flowers.push(Object.assign({ o: 0, ov: 0, boost: 1, spin: 0, openTime: 0 }, s));
  }
}
function drawFlowerSea(poX, poY) {
  energy = Math.max(0, energy * 0.9975 - 0.0004);
  // motion is tied to the music actually sounding: it fades to a complete
  // stop ~4s after the last note (matching the piano's decay tail)
  const since = performance.now() - lastNoteAt;
  const moving = Math.min(1, energy * 2) * Math.max(0, Math.min(1, (4000 - since) / 2500));
  for (const f of flowers) {
    // bloom-in eases open monotonically — size only ever grows, so there is
    // no pop/blink; everything freezes exactly once the music stops
    f.o += (1 - f.o) * 0.035;
    if (1 - f.o < 0.002) f.o = 1;
    if (moving > 0.01 && f.o > 0.85) {
      f.spin += 0.0015 + energy * 0.0025;
      f.openTime += energy / 60;
      if (f.openTime > f.rebloomEvery) {            // re-bloom: grow a size bigger
        f.openTime = 0;
        f.boostT = Math.min(1.45, (f.boostT || 1) * 1.09);
      }
    }
    // boost eases toward its target while the music sounds — smooth growth,
    // no snap; the rate rides the motion envelope so it stops with the sound
    if (moving > 0.001) {
      const bt = f.boostT || 1;
      f.boost += (bt - f.boost) * 0.02 * Math.min(1, moving * 3);
      if (bt - f.boost < 0.001) f.boost = bt;
    }
    const im = headCanvases[f.kind];
    if (!im || f.o <= 0.02) continue;
    const x = imgBox.x + f.rx * imgBox.w + poX;
    const y = imgBox.y + f.ry * imgBox.h + poY;
    const wob = moving * Math.sin(t * 3.6 + f.phase) * 0.055;
    const size = f.s * Math.max(0, f.o) * f.boost;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(f.rot + f.spin + wob);
    ctx.drawImage(im, -size / 2, -size / 2, size, size);
    ctx.restore();
  }
}
let lastMouse = null;

function layout() {
  W = innerWidth; H = innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

  // image box: centered, giving the header and score breathing room
  let iw = Math.min(W * 0.46, 760);
  const maxH = H * 0.78;
  if (iw * (imgH / imgW) > maxH) iw = maxH * (imgW / imgH);
  const ih = iw * (imgH / imgW);
  imgBox = { x: W / 2 - iw / 2, y: H * 0.485 - ih / 2, w: iw, h: ih };

  // build strands hanging in a row just below the andreessen horowitz sign
  const SIGN = { x0: -0.05, x1: 1.05, y: 0.325 }; // hang line spanning past the photo edges
  strands.length = 0;
  let cursor = 0;
  const spanX = (SIGN.x1 - SIGN.x0) * imgBox.w;
  const n = Math.floor(spanX / COL_SPACING);
  for (let s = 0; s <= n; s++) {
    const ax = imgBox.x + SIGN.x0 * imgBox.w + s * COL_SPACING;
    const ay = imgBox.y + SIGN.y * imgBox.h;
    // ragged bottom edge: reach roughly the foot of the building
    const noise = Math.sin(s * 0.55) * 0.5 + Math.sin(s * 0.13 + 2) * 0.5;
    let frac = 0.38 + noise * 0.06;
    if (Math.sin(s * 2.17 + 1) > 0.86) frac *= 0.55 + 0.2 * Math.abs(Math.sin(s));
    const len = Math.max(4, Math.floor((imgBox.h * frac) / SEG));
    const pts = [], chars = [], cols = [];
    for (let i = 0; i <= len; i++) {
      pts.push({ x: ax, y: ay + i * SEG, px: ax, py: ay + i * SEG });
      const [ch, col] = STREAM[cursor % STREAM.length]; cursor++;
      chars.push(ch); cols.push(col);
    }
    strands.push({ ax, ay, baseAx: ax, baseAy: ay, pts, chars, cols, phase: s * 0.35, idx: s, count: n + 1, lastNote: 0, hit: false });
  }
  buildMasked();
}

// ---------- torn / painterly edge mask for the photo ----------
// the jpg carries a BORDER-px smeared margin on every side, so the mask's
// overhanging swipes reveal paint-stroke continuations of the photo
const BORDER = 106;
let maskedCanvas = null, maskExt = 0;
function buildMasked() {
  if (!img.complete || !imgBox.w) return;
  const w = imgBox.w, h = imgBox.h;
  const pad = maskExt = w * BORDER / imgW;
  const mc = document.createElement('canvas');
  mc.width = Math.ceil((w + pad * 2) * DPR); mc.height = Math.ceil((h + pad * 2) * DPR);
  const m = mc.getContext('2d');
  m.setTransform(DPR, 0, 0, DPR, 0, 0);
  let seed = 987654321 >>> 0;
  const rnd = () => (seed = (seed * 1664525 + 1013904223) >>> 0) / 4294967296;

  // core region, well inside the photo
  m.fillStyle = '#000';
  m.fillRect(pad + 24, pad + 24, w - 48, h - 48);

  // torn edge: overlapping dabs along the perimeter, biased inward so the
  // edge reads ragged with only occasional outward bites
  const per = 2 * (w + h);
  const steps = Math.floor(per / 12);
  for (let i = 0; i < steps; i++) {
    const p = (i / steps) * per;
    let x, y, nx = 0, ny = 0; // inward normal
    if (p < w) { x = p; y = 0; ny = 1; }
    else if (p < w + h) { x = w; y = p - w; nx = -1; }
    else if (p < 2 * w + h) { x = 2 * w + h - p; y = h; ny = -1; }
    else { x = 0; y = 2 * (w + h) - p; nx = 1; }
    const r = 7 + rnd() * 20 + (rnd() < 0.1 ? rnd() * 30 : 0);
    m.beginPath();
    m.arc(pad + x + nx * 10 + (rnd() - 0.5) * 20, pad + y + ny * 10 + (rnd() - 0.5) * 20, r, 0, 7);
    m.fill();
  }

  // big painterly swipes breaking past the edges, like the reference
  const swipe = (cx, cy, rx, ry, rot) => {
    m.save(); m.translate(pad + cx, pad + cy); m.rotate(rot);
    m.beginPath(); m.ellipse(0, 0, rx, ry, 0, 0, 7); m.fill();
    for (let i = 0; i < 26; i++) {
      const a = rnd() * 7;
      m.beginPath();
      m.arc(Math.cos(a) * rx * 0.92, Math.sin(a) * ry * 0.92, 4 + rnd() * 12, 0, 7);
      m.fill();
    }
    m.restore();
  };
  swipe(w * 0.76, -20, w * 0.21, 30, -0.05); // sky swipe, top right
  swipe(w * 0.16, -10, w * 0.15, 20, 0.05);
  swipe(-16, h * 0.58, 26, h * 0.2, 0);      // left edge bite
  swipe(w + 14, h * 0.46, 24, h * 0.24, 0);  // right edge bite
  swipe(w * 0.5, h + 10, w * 0.2, 22, 0.03); // bottom crumble

  // keep the (border-extended) photo only where the mask is
  m.globalCompositeOperation = 'source-in';
  m.drawImage(img, 0, 0, w + pad * 2, h + pad * 2);
  maskedCanvas = mc;
}

function step(strand, t) {
  const pts = strand.pts;
  for (let i = 1; i < pts.length; i++) {
    const p = pts[i];
    const vx = (p.x - p.px) * DAMP;
    const vy = (p.y - p.py) * DAMP;
    p.px = p.x; p.py = p.y;
    const breeze = Math.sin(t * 0.9 + p.y * 0.012 + strand.phase) * 0.045;
    p.x += vx + breeze;
    p.y += vy + GRAVITY;
    const dx = p.x - mouse.x, dy = p.y - mouse.y;
    const d = Math.hypot(dx, dy);
    if (d < RADIUS && mouse.speed > 0.2) {
      const f = (1 - d / RADIUS) * PUSH;
      p.x += mouse.vx * f;
      p.y += mouse.vy * f * 0.55;
      strand.hit = true;
    }
  }
  for (let k = 0; k < ITER; k++) {
    pts[0].x = strand.ax; pts[0].y = strand.ay;
    for (let i = 1; i < pts.length; i++) {
      const a = pts[i - 1], b = pts[i];
      const dx = b.x - a.x, dy = b.y - a.y;
      const d = Math.hypot(dx, dy) || 1e-6;
      const diff = (d - SEG) / d;
      const mx = dx * 0.5 * diff, my = dy * 0.5 * diff;
      if (i === 1) { b.x -= dx * diff; b.y -= dy * diff; }
      else { a.x += mx; a.y += my; b.x -= mx; b.y -= my; }
    }
  }
}

// ---------- piano: each strand is a string, brushing plays notes ----------
let audioCtx = null;
let soundOn = false;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; }
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

const soundBtn = document.getElementById('soundBtn');
const icoOn = document.getElementById('icoOn');
const icoOff = document.getElementById('icoOff');
soundBtn.addEventListener('click', () => {
  soundOn = !soundOn;
  if (soundOn) ensureAudio();
  icoOn.style.display = soundOn ? '' : 'none';
  icoOff.style.display = soundOn ? 'none' : '';
  soundBtn.title = soundOn ? 'Turn sound off' : 'Turn sound on';
});

const PENTA = [0, 2, 4, 7, 9]; // C major pentatonic
function strandSemi(i, n) {
  const deg = Math.floor((i / Math.max(1, n - 1)) * 14.999); // three octaves
  return PENTA[deg % 5] + 12 * Math.floor(deg / 5); // semitones above middle C
}
let lastNoteAt = 0;
// one synth voice, usable on the live context or an OfflineAudioContext
function pluckInto(ac, dest, freq, vel, at) {
  const t0 = at;
  const g = ac.createGain();
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(0.10 * vel, t0 + 0.004);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + 1.8);
  const lp = ac.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = Math.min(freq * 6, 8500); lp.Q.value = 0.4;
  const o1 = ac.createOscillator(); o1.type = 'sine'; o1.frequency.value = freq;
  const o2 = ac.createOscillator(); o2.type = 'triangle'; o2.frequency.value = freq * 2;
  const g2 = ac.createGain(); g2.gain.value = 0.30;
  o1.connect(g); o2.connect(g2); g2.connect(g);
  g.connect(lp); lp.connect(dest);
  o1.start(t0); o2.start(t0); o1.stop(t0 + 1.9); o2.stop(t0 + 1.9);
}
function pluck(freq, vel) {
  if (!soundOn || !audioCtx || audioCtx.state !== 'running') return;
  pluckInto(audioCtx, audioCtx.destination, freq, vel, audioCtx.currentTime);
}

// ---------- download the played song as a .wav ----------
async function renderSong() {
  const notes = score.notes;
  if (!notes.length) return null;
  const t0 = notes[0].at;
  const dur = (notes[notes.length - 1].at - t0) / 1000 + 2.4;
  const off = new OfflineAudioContext(1, Math.ceil(44100 * dur), 44100);
  for (const n of notes) pluckInto(off, off.destination, 261.63 * Math.pow(2, n.semi / 12), n.vel, (n.at - t0) / 1000);
  const buf = await off.startRendering();
  return encodeWav(buf);
}
function encodeWav(buf) {
  const data = buf.getChannelData(0);
  const out = new DataView(new ArrayBuffer(44 + data.length * 2));
  const str = (o, s) => { for (let i = 0; i < s.length; i++) out.setUint8(o + i, s.charCodeAt(i)); };
  str(0, 'RIFF'); out.setUint32(4, 36 + data.length * 2, true); str(8, 'WAVE');
  str(12, 'fmt '); out.setUint32(16, 16, true); out.setUint16(20, 1, true); out.setUint16(22, 1, true);
  out.setUint32(24, 44100, true); out.setUint32(28, 44100 * 2, true); out.setUint16(32, 2, true); out.setUint16(34, 16, true);
  str(36, 'data'); out.setUint32(40, data.length * 2, true);
  for (let i = 0; i < data.length; i++) {
    const s = Math.max(-1, Math.min(1, data[i]));
    out.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7fff, true);
  }
  return out.buffer;
}
const dlBtn = document.getElementById('dlBtn');
dlBtn.addEventListener('click', async () => {
  const wav = await renderSong();
  if (!wav) return;
  const url = URL.createObjectURL(new Blob([wav], { type: 'audio/wav' }));
  const a = document.createElement('a');
  a.href = url; a.download = 'music.wav';
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 4000);
});

// ---------- live score: notate each plucked note on a scrolling staff ----------
// staff position = diatonic steps above E4 (bottom line of the treble staff)
const LETTER = { 0: 0, 2: 1, 4: 2, 7: 4, 9: 5 }; // pitch class -> C D E G A
const score = { notes: [], max: 200, xStep: 24 };
function recordNote(semi, vel) {
  const midi = 60 + semi;
  const dn = (Math.floor(midi / 12) - 1) * 7 + LETTER[midi % 12];
  score.notes.push({ semi, steps: dn - 30, at: performance.now(), vel });
  if (score.notes.length > score.max) score.notes.shift();
  dlBtn.disabled = false;
  energy = Math.min(1.6, energy + 0.16);
  spawnFlowers();
}
function drawSheet(now) {
  const sw = Math.min(W * 0.56, 900);
  const x0 = (W - sw) / 2;
  const gap = 9;                       // staff line spacing
  const bottom = H - 96;               // bottom staff line
  const yOf = steps => bottom - steps * gap / 2;

  ctx.save();
  // label + staff (label sits above the tallest possible ledger stack: A6 = 17 steps)
  ctx.font = '8px "IBM Plex Mono", monospace';
  ctx.fillStyle = 'rgba(138,133,120,0.9)';
  ctx.textAlign = 'center';
  ctx.fillText('L I V E   S C O R E · C  M A J O R  P E N T A T O N I C', x0 + sw / 2, bottom - 19 * gap / 2 - 12);
  ctx.textAlign = 'left';
  ctx.strokeStyle = 'rgba(46,42,36,0.32)';
  ctx.lineWidth = 1;
  for (let l = 0; l < 5; l++) {
    ctx.beginPath();
    ctx.moveTo(x0, yOf(l * 2));
    ctx.lineTo(x0 + sw, yOf(l * 2));
    ctx.stroke();
  }
  // clef
  ctx.font = '46px serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = 'rgba(46,42,36,0.75)';
  ctx.fillText('\u{1D11E}', x0 + 6, bottom + 10);

  // notes scroll left once the line fills
  const headX0 = x0 + 52;
  const n = score.notes.length;
  const scroll = Math.max(0, headX0 + n * score.xStep - (x0 + sw - 24) );
  ctx.textAlign = 'center';
  for (let i = 0; i < n; i++) {
    const note = score.notes[i];
    const x = headX0 + i * score.xStep - scroll;
    if (x < headX0 - 4) continue;
    const y = yOf(note.steps);
    const age = now - note.at;
    const pop = age < 260 ? 1 + 0.5 * (1 - age / 260) : 1;
    const fresh = age < 450;
    // fade near the left edge as notes scroll off
    const edge = Math.min(1, (x - (headX0 - 4)) / 60);
    ctx.globalAlpha = edge;
    ctx.fillStyle = ctx.strokeStyle = fresh ? '#e8420a' : '#2e2a24';
    // barline every 8 notes
    if (i > 0 && i % 8 === 0) {
      ctx.save();
      ctx.globalAlpha = 0.25 * edge;
      ctx.strokeStyle = '#2e2a24';
      ctx.beginPath();
      ctx.moveTo(x - score.xStep / 2, yOf(8));
      ctx.lineTo(x - score.xStep / 2, yOf(0));
      ctx.stroke();
      ctx.restore();
    }
    // ledger lines
    ctx.lineWidth = 1;
    for (let s = -2; s >= note.steps; s -= 2) ledger(x, yOf(s));
    for (let s = 10; s <= note.steps; s += 2) ledger(x, yOf(s));
    // note head
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(-0.35);
    ctx.beginPath();
    ctx.ellipse(0, 0, 4.8 * pop, 3.5 * pop, 0, 0, 7);
    ctx.fill();
    ctx.restore();
    // stem: up for low notes, down for high (from the middle line)
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    if (note.steps < 4) { ctx.moveTo(x + 4.4, y - 1); ctx.lineTo(x + 4.4, y - 27); }
    else { ctx.moveTo(x - 4.4, y + 1); ctx.lineTo(x - 4.4, y + 27); }
    ctx.stroke();
  }
  ctx.restore();

  function ledger(x, y) {
    ctx.beginPath();
    ctx.moveTo(x - 6.5, y);
    ctx.lineTo(x + 6.5, y);
    ctx.stroke();
  }
}

let t = 0;
function frame() {
  t += 1 / 60;
  ctx.clearRect(0, 0, W, H);

  // parallax: ease toward the cursor-derived target; each layer moves at its
  // own depth (photo slow, curtain faster, page copy drifts opposite)
  par.x += (par.tx - par.x) * 0.055;
  par.y += (par.ty - par.y) * 0.055;
  const poX = par.x * 14, poY = par.y * 9;      // photo layer
  leftEl.style.transform = `translate(${par.x * -10}px, ${par.y * -6}px)`;

  // photo with torn edges and soft shadow
  ctx.save();
  ctx.shadowColor = 'rgba(40,30,15,0.30)';
  ctx.shadowBlur = 50;
  ctx.shadowOffsetY = 24;
  ctx.drawImage(maskedCanvas, imgBox.x - maskExt + poX, imgBox.y - maskExt + poY, imgBox.w + maskExt * 2, imgBox.h + maskExt * 2);
  ctx.restore();

  // curtain — anchored to the photo layer so it stays pinned under the sign;
  // brushed strands play pentatonic piano notes (left = low, right = high)
  ctx.font = FONT;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const now = performance.now();
  for (const s of strands) {
    s.ax = s.baseAx + poX; s.ay = s.baseAy + poY;
    s.hit = false;
    step(s, t);
    if (s.hit && now - s.lastNote > 130 && now - lastNoteAt > 28) {
      s.lastNote = lastNoteAt = now;
      const semi = strandSemi(s.idx, s.count);
      const vel = Math.min(1, 0.25 + mouse.speed / 28);
      pluck(261.63 * Math.pow(2, semi / 12), vel);
      recordNote(semi, vel);
    }
    const pts = s.pts;
    for (let i = 1; i < pts.length; i++) {
      ctx.fillStyle = s.cols[i];
      ctx.fillText(s.chars[i], pts[i].x, pts[i].y);
    }
  }

  drawFlowerSea(poX, poY);

  drawSheet(now);

  // decay mouse velocity so strands settle when pointer stops
  mouse.vx *= 0.82; mouse.vy *= 0.82; mouse.speed *= 0.82;

  requestAnimationFrame(frame);
}

addEventListener('mousemove', e => {
  if (lastMouse) {
    mouse.vx = Math.max(-40, Math.min(40, e.clientX - lastMouse.x));
    mouse.vy = Math.max(-40, Math.min(40, e.clientY - lastMouse.y));
    mouse.speed = Math.hypot(mouse.vx, mouse.vy);
  }
  mouse.x = e.clientX; mouse.y = e.clientY;
  lastMouse = { x: e.clientX, y: e.clientY };
  par.tx = Math.max(-1, Math.min(1, (e.clientX - W / 2) / (W / 2)));
  par.ty = Math.max(-1, Math.min(1, (e.clientY - H / 2) / (H / 2)));
});
addEventListener('mouseleave', () => { mouse.x = mouse.y = -9999; par.tx = par.ty = 0; });
addEventListener('resize', layout);

let imgW = 1600, imgH = 1000;
img.onload = () => { imgW = img.naturalWidth - 2 * BORDER; imgH = img.naturalHeight - 2 * BORDER; layout(); frame(); };
img.src = 'clip_ext.jpg';
</script>
</body>
</html>
